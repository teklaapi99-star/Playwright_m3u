name: Update m3u8 links & playlist every hour

on:
  schedule:
    # Every hour → "0 * * * *" means at minute 0 of every hour
    - cron: '0 * * * *'

  # Also allow manual trigger from GitHub UI (very useful for testing)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout your repository ───────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # important if you want to commit later

      # ── Set up Python ───────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Install dependencies ────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Install Playwright browsers ─────────────────────────────
      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      # ── Run your script ─────────────────────────────────────────
      - name: Run m3u8 fetch script
        run: python main.py

      # ── Commit & push updated files (if changed) ────────────────
      - name: Commit updated Excel & m3u8 playlist
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

          git add ${{ env.OUTPUT_EXCEL }} ${{ env.OUTPUT_M3U }} || true
          git diff --staged --quiet || git commit -m "Auto-update: refreshed m3u8 links and playlist [$(date '+%Y-%m-%d %H:%M')]" || echo "No changes to commit"
          git push || echo "Nothing to push"
      - name: Auto commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update m3u8 links & playlist"
          file_pattern: "*.xlsx *.m3u8"
          skip_dirty_check: false
          skip_fetch: false
          skip_commit: false
        env:
          INPUT_EXCEL:  Cartoonxlsx.xlsx
          OUTPUT_EXCEL: updated_videos_with_links.xlsx
          OUTPUT_M3U:   all_channels_playlist.m3u8

      # Optional: if you want to create a pull request instead of direct push:
      # - uses: peter-evans/create-pull-request@v6
      #   with:
      #     commit-message: Auto-update m3u8 links
      #     title: "chore: auto-update m3u8 playlist"
      #     branch: auto-update-m3u8
