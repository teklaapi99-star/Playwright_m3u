name: Hourly Update - m3u8 links & playlist

on:
  schedule:
    # Runs every hour at minute 30 (UTC) → roughly every hour on the hour in IST
    - cron: '30 * * * *'

  # Allows you to manually trigger it from the Actions tab
  workflow_dispatch:

permissions:
  contents: write    # Required so the workflow can git push / commit

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      # ───────────────────────────────────────────────────────────────
      # 1. Get your repository code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Important for git commit to work properly

      # ───────────────────────────────────────────────────────────────
      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ───────────────────────────────────────────────────────────────
      # 3. Install Python dependencies
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # ───────────────────────────────────────────────────────────────
      # 4. Install Playwright + required system dependencies + Chromium
      - name: Install Playwright browsers
        run: |
          python -m playwright install-deps
          python -m playwright install chromium --with-deps

      # ───────────────────────────────────────────────────────────────
      # 5. Run your main script
      - name: Run m3u8 fetch & playlist generator
        run: python main.py
        env:
          # Optional: you can pass variables if your script supports them
          INPUT_EXCEL: Cartoonxlsx.xlsx
          OUTPUT_EXCEL: updated_videos_with_links.xlsx
          OUTPUT_M3U: all_channels_playlist.m3u8

      # ───────────────────────────────────────────────────────────────
      # 6. Commit and push output files (even if unchanged - good for first run)
      - name: Commit updated files (Excel + m3u8)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(auto): updated m3u8 links & playlist ${{ github.run_number }}"
          file_pattern: |
            *.xlsx
            *.m3u8
          skip_dirty_check: false
          skip_fetch: false
          skip_commit: false
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>

      # ───────────────────────────────────────────────────────────────
      # 7. (Optional) Show what files exist after the run - for debugging
      - name: List generated files (debug)
        run: |
          ls -la | grep -E '\.xlsx|\.m3u8' || echo "No xlsx or m3u8 files found"
