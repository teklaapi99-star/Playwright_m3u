name: Update m3u8 links & playlist every hour

on:
  schedule:
    - cron: '30 * * * *'          # Every hour at :30 UTC → :00 IST (Chennai time)
  workflow_dispatch:              # Allows manual "Run workflow" button

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run m3u8 fetch script
        run: python main.py

      - name: Commit updated files (if changed)
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"

          git add updated_videos_with_links.xlsx all_channels_playlist.m3u8 || true
          git diff --staged --quiet || git commit -m "chore: auto-update m3u8 links & playlist $(date '+%Y-%m-%d %H:%M UTC')"
          git push || echo "No changes → nothing to push"
